name: Sign Helm Chart (one-off)

on:
  workflow_dispatch:

permissions: {}

jobs:
  sign:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      id-token: write
    environment: release
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@fb28c2b6339dcd94da6e4cbcbc5e888961f6f8c3 # v3.9.0

      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io -u "${ACTOR}" --password-stdin
          echo "${GITHUB_TOKEN}" | cosign login ghcr.io -u "${ACTOR}" --password-stdin

      - name: Sign chart by digest
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          cosign sign --yes "ghcr.io/${OWNER}/charts/cooked@sha256:d57d101d63d8c71630653fbe058fbd2b40a96e765ca94b75c2b79ce764bf5012"
