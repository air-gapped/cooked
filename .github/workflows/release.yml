name: Release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          release-type: go
          token: ${{ steps.app-token.outputs.token }}

  build-binaries:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Download embedded assets
        run: make deps

      - name: Build all platforms
        run: make build-all

      - name: Package archives
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          cd dist
          for bin in cooked-*; do
            os_arch="${bin#cooked-}"
            os="${os_arch%-*}"
            arch="${os_arch#*-}"
            archive="cooked_${TAG}_${os}_${arch}.tar.gz"
            mv "$bin" cooked
            tar czf "$archive" cooked
            mv cooked "$bin"
          done
          sha256sum cooked_*.tar.gz > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-archives
          path: |
            dist/cooked_*.tar.gz
            dist/checksums.txt

  docker:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install cosign
        uses: sigstore/cosign-installer@fb28c2b6339dcd94da6e4cbcbc5e888961f6f8c3 # v3.9.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            LDFLAGS=-X main.version=${{ needs.release-please.outputs.tag_name }} -X main.commit=${{ github.sha }} -X main.date=${{ github.event.head_commit.timestamp }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Sign image with cosign
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
          REPO: ${{ github.repository }}
        run: |
          IMAGE="ghcr.io/${REPO}@${DIGEST}"
          echo "Signing ${IMAGE}"
          MAX_RETRIES=5
          DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            cosign sign --yes "$IMAGE" && break
            echo "cosign attempt $i/$MAX_RETRIES failed, retrying in ${DELAY}s..."
            sleep $DELAY
            DELAY=$((DELAY * 2))
          done

  upload-assets:
    needs: [release-please, build-binaries]
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-archives
          path: dist

      - name: Upload release assets
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/cooked_*.tar.gz
            dist/checksums.txt
