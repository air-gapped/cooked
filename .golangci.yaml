# golangci-lint v2 configuration
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  tests: true

linters:
  # Default linters (errcheck, govet, staticcheck, ineffassign, unused)
  # are enabled automatically — only extras listed here.
  enable:
    - bodyclose   # HTTP response body not closed
    - gocyclo     # Cyclomatic complexity
    - gosec       # Security issues
    - misspell    # Spelling errors

  settings:
    errcheck:
      check-type-assertions: false
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - io.Copy
        - (*flag.FlagSet).Parse
    gocyclo:
      min-complexity: 20
    gosec:
      excludes:
        - G104  # Audit errors not checked (covered by errcheck)
        - G304  # File path from variable (often false positive)
        - G107  # HTTP request with variable url (upstream fetching is core feature)
        - G404  # Weak random (not security-critical here)
        - G705  # XSS via taint analysis (HTML is sanitized before w.Write)
        - G706  # Log injection via taint analysis (slog structured logging is safe)

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Tests: relax errcheck, gosec, gocyclo, bodyclose
      - linters: [errcheck]
        path: _test\.go
      - linters: [gosec]
        path: _test\.go
        text: "G(306|402|112|114|703)"
      - linters: [gocyclo]
        path: _test\.go
      - linters: [bodyclose]
        path: _test\.go
      # template.HTML is intentional — content is sanitized before this point
      - linters: [gosec]
        path: internal/server/server\.go
        text: G203
      # InsecureSkipVerify is intentional for --tls-skip-verify flag
      - linters: [gosec]
        path: (fetch|client)\.go
        text: G402
      # Complex functions in server/config are inherent
      - linters: [gocyclo]
        path: (server|config)\.go

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
